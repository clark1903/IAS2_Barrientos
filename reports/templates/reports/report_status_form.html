{% extends "base.html" %}
{% block title %}Update Status | InsightEdge{% endblock %}

{% block content %}
<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h1 class="h5 mb-3">Update Report Status</h1>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Status</label>
        {{ form.status }}
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{% url 'reports:detail' object.pk %}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
